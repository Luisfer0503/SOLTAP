[variables]
    # Definimos las extensiones para que Nixpacks las reconozca globalmente
    NIXPACKS_PHP_EXTENSIONS = "bcmath, pdo_mysql, zip, mbstring, xml, curl"

[phases.setup]
    # Instalamos los binarios de PHP y las extensiones necesarias en el sistema
    nixPkgs = [
        "php82",
        "php82Extensions.bcmath",
        "php82Extensions.pdo_mysql",
        "php82Extensions.zip",
        "php82Packages.composer"
    ]

[phases.install]
    # Ahora que el sistema tiene bcmath, el install funcionará sin problemas
    cmds = [
        "composer install --optimize-autoloader --no-scripts --no-interaction",
        "npm install"
    ]

[phases.build]
    # Agregamos la fase de build para los assets de Frontend si los usas
    cmds = ["npm run build"]