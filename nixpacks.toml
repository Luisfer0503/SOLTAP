# Definimos las variables de entorno globales para PHP
[variables]
    NIXPACKS_PHP_EXTENSIONS = "bcmath, pdo_mysql, zip, redis, mbstring, xml"

# FASE 1: Instalación de binarios y extensiones en el sistema operativo
[phases.setup]
    nixPkgs = [
        "php82",
        "php82Extensions.bcmath",
        "php82Extensions.pdo_mysql",
        "php82Extensions.zip",
        "php82Packages.composer"
    ]

# FASE 2: Instalación de dependencias de la aplicación
[phases.install]
    dependsOn = ["setup"]
    cmds = [
        "composer install --optimize-autoloader --no-scripts --no-interaction",
        "npm install"
    ]

# FASE 3: Compilación de assets (Vite/Mix)
[phases.build]
    dependsOn = ["install"]
    cmds = ["npm run build"]