[variables]
    # Habilita las extensiones para el entorno de ejecución
    NIXPACKS_PHP_EXTENSIONS = "bcmath, pdo_mysql, zip, redis, mbstring, xml"

[phases.setup]
    # Instalamos los binarios necesarios en el sistema Nix
    nixPkgs = [
        "php82",
        "php82Extensions.bcmath",
        "php82Extensions.pdo_mysql",
        "php82Packages.composer",
        "nodejs_20"
    ]

[phases.install]
    dependsOn = ["setup"]
    cmds = [
        # EL CAMBIO CLAVE: Forzamos a Composer a ignorar el requisito de bcmath
        "composer install --ignore-platform-req=ext-bcmath --optimize-autoloader --no-scripts --no-interaction",
        "npm install"
    ]

[phases.build]
    dependsOn = ["install"]
    cmds = ["npm run build"]