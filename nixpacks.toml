[variables]
NIXPACKS_PHP_VERSION = "8.2"
NIXPACKS_PHP_EXTENSIONS = "bcmath pdo_mysql mbstring xml zip"

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --ignore-platform-req=ext-bcmath --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"