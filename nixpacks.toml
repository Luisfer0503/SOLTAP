[variables]
    NIXPACKS_PHP_EXTENSIONS = "bcmath, pdo_mysql, zip, redis, mbstring, xml, openssl"

[phases.setup]
    nixPkgs = [
        "php82",
        "php82Extensions.bcmath",
        "php82Extensions.pdo_mysql",
        "php82Extensions.zip",
        "php82Packages.composer",
        "nodejs_20"
    ]

[phases.install]
    dependsOn = ["setup"]
    cmds = [
        "composer install --optimize-autoloader --no-scripts --no-interaction",
        "npm install"
    ]

[phases.build]
    dependsOn = ["install"]
    cmds = ["npm run build"]