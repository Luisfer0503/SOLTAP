[variables]
    # Estas variables habilitan las extensiones en el entorno de ejecución (Runtime)
    NIXPACKS_PHP_EXTENSIONS = "bcmath, pdo_mysql, zip, redis, mbstring, xml"

[phases.setup]
    # Instalamos los paquetes necesarios en el sistema
    nixPkgs = [
        "php82",
        "php82Extensions.bcmath",
        "php82Extensions.pdo_mysql",
        "php82Packages.composer",
        "nodejs_20"
    ]

[phases.install]
    dependsOn = ["setup"]
    cmds = [
        # EL CAMBIO CLAVE: Agregamos el flag --ignore-platform-req=ext-bcmath
        "composer install --ignore-platform-req=ext-bcmath --optimize-autoloader --no-scripts --no-interaction",
        "npm install"
    ]

[phases.build]
    dependsOn = ["install"]
    cmds = ["npm run build"]